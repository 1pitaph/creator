services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: creator
      POSTGRES_PASSWORD: creator
      POSTGRES_DB: creator_agent
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creator -d creator_agent"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - creator-postgres:/var/lib/postgresql/data

  data-kernel:
    build:
      context: ./apps/data-kernel
    environment:
      DATA_KERNEL_TOKEN: local-dev-token
    ports:
      - "8790:8790"
    read_only: true
    tmpfs:
      - /tmp:size=64m
    mem_limit: 512m
    cpus: 1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8790/health').read()"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  creator-postgres:
