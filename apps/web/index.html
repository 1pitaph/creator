    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #f5f6f8;
      }

      #instant-splash {
        position: fixed;
        inset: 0;
        z-index: 70;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f6f8;
      }

      .instant-splash__mark {
        width: 96px;
        height: 96px;
        animation: instant-splash-breathe 1.1s ease-in-out infinite;
      }

      .instant-splash__pixel {
        opacity: 0.86;
        transform-box: fill-box;
        transform-origin: center;
        animation: instant-splash-pixel 0.86s ease-in-out infinite alternate;
      }

      .instant-splash__pixel:nth-child(3n) {
        animation-delay: 90ms;
      }

      .instant-splash__pixel:nth-child(4n) {
        animation-delay: 180ms;
      }

      .instant-splash__pixel:nth-child(5n) {
        animation-delay: 270ms;
      }

      @keyframes instant-splash-breathe {
        0%,
        100% {
          transform: scale(0.98);
        }

        50% {
          transform: scale(1.03);
        }
      }

      @keyframes instant-splash-pixel {
        from {
          opacity: 0.42;
          transform: scale(0.72);
        }

        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .instant-splash__mark,
        .instant-splash__pixel {
          animation: none;
        }
      }
    </style>
  </head>
